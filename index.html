
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I'm Happy You're Mine</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#faf6f1;
background-image:
url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
color:#4a3728;
min-height:100vh;
font-family:'Lora',serif;
line-height:1.6;
overflow-x:hidden;
}

/* LOCKSCREEN */
#lockscreen{
position:fixed;
inset:0;
z-index:9999;
background:#faf6f1;
background-image:
url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:opacity 0.6s ease, transform 0.6s ease;
}

#lockscreen.unlocked{
opacity:0;
transform:scale(1.05);
pointer-events:none;
}

.lock-card{
background:#fff;
padding:50px 48px;
border-radius:4px;
box-shadow:4px 6px 20px rgba(0,0,0,0.08);
text-align:center;
position:relative;
max-width:400px;
width:90%;
border:1px solid #f0e8e0;
}

.lock-card::before{
content:'';
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:60px;
height:16px;
background:rgba(180,160,130,0.4);
border-radius:2px;
}

.lock-icon{
font-size:2.4rem;
margin-bottom:10px;
}

.lock-card h2{
font-family:'Caveat',cursive;
font-size:2rem;
color:#6b4c4c;
margin-bottom:6px;
}

.lock-card p{
font-family:'Lora',serif;
font-size:0.9rem;
color:#a08080;
margin-bottom:24px;
font-style:italic;
}

.lock-input-group{
position:relative;
margin-bottom:16px;
}

#passwordInput{
width:100%;
padding:14px 18px;
border:1px solid #e0d6cc;
border-radius:6px;
background:#fdfbf8;
font-family:'Lora',serif;
font-size:1rem;
color:#4a3728;
letter-spacing:4px;
text-align:center;
transition:all 0.3s ease;
}

#passwordInput:focus{
outline:none;
border-color:#d4a0a0;
background:#fff;
box-shadow:0 0 0 3px rgba(212,160,160,0.15);
}

#passwordInput.error{
border-color:#c75050;
animation:shake 0.4s ease;
box-shadow:0 0 0 3px rgba(199,80,80,0.1);
}

.unlock-btn{
width:100%;
padding:14px 28px;
border:none;
border-radius:6px;
background:#6b4c4c;
color:#fff;
cursor:pointer;
font-family:'Caveat',cursive;
font-size:1.3rem;
font-weight:600;
transition:all 0.3s ease;
box-shadow:2px 3px 8px rgba(107,76,76,0.2);
}

.unlock-btn:hover{
background:#8b6060;
transform:translateY(-2px);
box-shadow:3px 5px 12px rgba(107,76,76,0.3);
}

.lock-hint{
font-size:0.85rem;
color:#c75050;
margin-top:14px;
font-style:italic;
opacity:0;
transition:opacity 0.3s;
}

.lock-hint.show{
opacity:1;
}

.lock-flower{
position:absolute;
opacity:0.08;
font-size:4rem;
pointer-events:none;
}
.lock-flower-1{top:15%;left:10%;}
.lock-flower-2{bottom:20%;right:8%;}

@keyframes shake{
0%,100%{transform:translateX(0);}
25%{transform:translateX(-6px);}
50%{transform:translateX(6px);}
75%{transform:translateX(-4px);}
}

/* MAIN APP (hidden until unlocked) */
#app{
display:none;
}

#app.visible{
display:block;
}

header{
text-align:center;
padding:50px 20px 30px;
position:relative;
}

header::after{
content:'';
display:block;
width:200px;
height:3px;
background:linear-gradient(90deg,transparent,#d4a0a0,transparent);
margin:20px auto 0;
}

h1{
font-family:'Caveat',cursive;
font-size:3.5rem;
color:#6b4c4c;
font-weight:700;
letter-spacing:1px;
text-shadow:1px 1px 2px rgba(107,76,76,0.1);
}

header p{
font-family:'Caveat',cursive;
font-size:1.3rem;
color:#a08080;
margin-top:8px;
}

nav{
margin-top:24px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

nav button{
padding:12px 28px;
border:none;
border-radius:4px;
background:#fff;
color:#6b4c4c;
cursor:pointer;
font-family:'Caveat',cursive;
font-size:1.2rem;
font-weight:600;
box-shadow:2px 3px 8px rgba(0,0,0,0.08);
transition:all 0.3s ease;
position:relative;
transform:rotate(-1deg);
}

nav button:nth-child(2){transform:rotate(0.5deg);}
nav button:nth-child(3){transform:rotate(-0.5deg);}
nav button:nth-child(4){transform:rotate(1deg);}

nav button:hover{
transform:translateY(-3px) rotate(0deg);
box-shadow:3px 5px 15px rgba(0,0,0,0.12);
background:#fef9f5;
}

nav button.active{
background:#6b4c4c;
color:#fff;
}

main{
max-width:1100px;
margin:auto;
padding:20px;
}

#content{
min-height:400px;
}

.form-card{
background:#fff;
padding:30px;
border-radius:3px;
margin-bottom:30px;
box-shadow:3px 4px 12px rgba(0,0,0,0.06);
position:relative;
border:1px solid #f0e8e0;
}

.form-card::before{
content:'';
position:absolute;
top:-8px;
left:50%;
transform:translateX(-50%);
width:60px;
height:16px;
background:rgba(180,160,130,0.4);
border-radius:2px;
}

.form-card h3{
font-family:'Caveat',cursive;
font-size:1.6rem;
color:#6b4c4c;
margin-bottom:16px;
}

input,textarea{
width:100%;
margin-bottom:14px;
padding:12px 16px;
border:1px dashed #d4c4b0;
border-radius:4px;
background:#fdfbf8;
font-family:'Lora',serif;
font-size:0.95rem;
color:#4a3728;
transition:border-color 0.3s;
}

input:focus,textarea:focus{
outline:none;
border-color:#d4a0a0;
background:#fff;
}

textarea{
resize:vertical;
min-height:120px;
}

.btn{
padding:12px 28px;
border:none;
border-radius:4px;
background:#6b4c4c;
color:#fff;
cursor:pointer;
font-family:'Caveat',cursive;
font-size:1.2rem;
font-weight:600;
transition:all 0.3s ease;
box-shadow:2px 3px 8px rgba(107,76,76,0.2);
}

.btn:hover{
background:#8b6060;
transform:translateY(-2px);
box-shadow:3px 5px 12px rgba(107,76,76,0.3);
}

.photo-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:30px;
padding:10px;
}

.polaroid{
background:#fff;
padding:12px 12px 40px;
box-shadow:3px 5px 15px rgba(0,0,0,0.1);
transition:all 0.4s ease;
cursor:pointer;
position:relative;
}

.polaroid:nth-child(odd){transform:rotate(-1.5deg);}
.polaroid:nth-child(even){transform:rotate(1.2deg);}
.polaroid:nth-child(3n){transform:rotate(-0.8deg);}

.polaroid:hover{
transform:rotate(0deg) translateY(-8px) scale(1.02);
box-shadow:5px 8px 25px rgba(0,0,0,0.15);
z-index:10;
}

.polaroid img{
width:100%;
aspect-ratio:1;
object-fit:cover;
display:block;
}

.polaroid .caption{
position:absolute;
bottom:10px;
left:12px;
right:12px;
font-family:'Caveat',cursive;
font-size:1.1rem;
color:#6b4c4c;
text-align:center;
}

.drop-zone{
border:2px dashed #d4c4b0;
border-radius:8px;
padding:40px 20px;
text-align:center;
cursor:pointer;
transition:all 0.3s;
background:#fdfbf8;
margin-bottom:14px;
}

.drop-zone:hover,.drop-zone.dragover{
border-color:#d4a0a0;
background:#fef5f0;
}

.drop-zone p{
font-family:'Caveat',cursive;
font-size:1.3rem;
color:#a08080;
}

.poem-page{
background:#fff;
padding:35px 30px;
margin-bottom:24px;
border-radius:2px;
box-shadow:2px 3px 10px rgba(0,0,0,0.06);
border-left:4px solid #d4a0a0;
position:relative;
transition:all 0.3s ease;
}

.poem-page:hover{
transform:translateX(4px);
box-shadow:4px 5px 15px rgba(0,0,0,0.08);
}

.poem-page h3{
font-family:'Caveat',cursive;
font-size:1.8rem;
color:#6b4c4c;
margin-bottom:12px;
}

.poem-page .poem-text{
white-space:pre-wrap;
font-family:'Lora',serif;
font-style:italic;
color:#5a4040;
line-height:1.9;
font-size:0.95rem;
}

.poem-page .poem-date{
font-size:0.8rem;
color:#b0a090;
margin-top:14px;
font-style:italic;
}

.song-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.cassette{
background:linear-gradient(135deg,#3d2b2b,#5a3e3e);
padding:24px;
border-radius:8px;
color:#f5e6d8;
position:relative;
overflow:hidden;
transition:all 0.3s ease;
box-shadow:3px 4px 12px rgba(0,0,0,0.2);
}

.cassette::before{
content:'';
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:80px;
height:80px;
border:3px solid rgba(255,255,255,0.08);
border-radius:50%;
}

.cassette::after{
content:'';
position:absolute;
top:50%;
left:calc(50% + 40px);
transform:translate(-50%,-50%);
width:80px;
height:80px;
border:3px solid rgba(255,255,255,0.08);
border-radius:50%;
}

.cassette:hover{
transform:translateY(-4px);
box-shadow:4px 6px 20px rgba(0,0,0,0.3);
}

.cassette h3{
font-family:'Caveat',cursive;
font-size:1.5rem;
color:#fff;
margin-bottom:6px;
position:relative;
z-index:1;
}

.cassette .artist{
font-size:0.9rem;
color:#d4a0a0;
margin-bottom:12px;
position:relative;
z-index:1;
}

.cassette a{
display:inline-block;
padding:6px 16px;
background:rgba(255,255,255,0.15);
color:#f5e6d8;
text-decoration:none;
border-radius:20px;
font-size:0.85rem;
transition:background 0.3s;
position:relative;
z-index:1;
}

.cassette a:hover{
background:rgba(255,255,255,0.25);
}

.timeline-container{
position:relative;
padding-left:40px;
}

.timeline-container::before{
content:'';
position:absolute;
left:15px;
top:0;
bottom:0;
width:2px;
background:linear-gradient(180deg,#d4a0a0,#b8c4a8,#d4a0a0);
}

.timeline-item{
position:relative;
margin-bottom:30px;
background:#fff;
padding:24px 28px;
border-radius:4px;
box-shadow:2px 3px 10px rgba(0,0,0,0.06);
border:1px solid #f0e8e0;
transition:all 0.3s ease;
}

.timeline-item::before{
content:'';
position:absolute;
left:-33px;
top:28px;
width:12px;
height:12px;
background:#d4a0a0;
border-radius:50%;
border:3px solid #faf6f1;
}

.timeline-item:hover{
transform:translateX(6px);
box-shadow:4px 5px 15px rgba(0,0,0,0.08);
}

.timeline-item h3{
font-family:'Caveat',cursive;
font-size:1.5rem;
color:#6b4c4c;
margin-bottom:8px;
}

.timeline-item .date{
font-size:0.8rem;
color:#a08080;
font-style:italic;
margin-bottom:8px;
background:#fef5f0;
display:inline-block;
padding:2px 10px;
border-radius:10px;
}

.timeline-item p{
color:#5a4040;
font-size:0.95rem;
}

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#6b4c4c;
color:#fff;
padding:14px 24px;
border-radius:4px;
font-family:'Caveat',cursive;
font-size:1.2rem;
box-shadow:3px 5px 15px rgba(0,0,0,0.2);
opacity:0;
transform:translateY(20px);
transition:all 0.4s ease;
z-index:1000;
pointer-events:none;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

.flower{
position:fixed;
opacity:0.06;
font-size:3rem;
pointer-events:none;
}

.flower-1{top:10%;left:5%;}
.flower-2{top:60%;right:3%;}
.flower-3{bottom:10%;left:8%;}

@media(max-width:600px){
h1{font-size:2.5rem;}
nav button{padding:10px 20px;font-size:1.1rem;}
.photo-grid{grid-template-columns:1fr;}
.song-grid{grid-template-columns:1fr;}
main{padding:12px;}
.form-card{padding:20px;}
.polaroid{padding:8px 8px 30px;}
.lock-card{padding:40px 24px;}
}
</style>
</head>
<body>

<!-- LOCKSCREEN -->
<div id="lockscreen">
<div class="lock-flower lock-flower-1">✿</div>
<div class="lock-flower lock-flower-2">❀</div>
<div class="lock-card">
<div class="lock-icon">🔒</div>
<h2>this one's private</h2>
<p>enter the password to continue</p>
<div class="lock-input-group">
<input type="password" id="passwordInput" placeholder="••••" autocomplete="off" autofocus>
</div>
<button class="unlock-btn" onclick="attemptUnlock()">unlock ♡</button>
<p class="lock-hint" id="lockHint">wrong password, try again</p>
</div>
</div>

<!-- MAIN APP -->
<div id="app">
<div class="flower flower-1">✿</div>
<div class="flower flower-2">❀</div>
<div class="flower flower-3">✿</div>

<header>
<h1>I'm Happy You're Mine</h1>
<p>our little scrapbook of everything</p>
<nav>
<button id="nav-photos" class="active" onclick="loadSection('photos')">Photos</button>
<button id="nav-poems" onclick="loadSection('poems')">Poems</button>
<button id="nav-songs" onclick="loadSection('songs')">Songs</button>
<button id="nav-timeline" onclick="loadSection('timeline')">Timeline</button>
</nav>
</header>

<main>
<div id="content"></div>
</main>

<div class="toast" id="toast"></div>
</div>

<script>
/* ===== LOCKSCREEN ===== */
const PASSCODE='0427';
const pwInput=document.getElementById('passwordInput');

pwInput.addEventListener('keydown',function(e){
if(e.key==='Enter')attemptUnlock();
});

function attemptUnlock(){
const val=pwInput.value;
if(val===PASSCODE){
unlock();
}else{
pwInput.classList.add('error');
document.getElementById('lockHint').classList.add('show');
setTimeout(()=>{
pwInput.classList.remove('error');
pwInput.value='';
pwInput.focus();
},800);
}
}

function unlock(){
const lock=document.getElementById('lockscreen');
lock.classList.add('unlocked');
setTimeout(()=>{
lock.style.display='none';
document.getElementById('app').classList.add('visible');
loadSection('photos');
},600);
}

/* ===== SUPABASE ===== */
const SUPABASE_URL="https://kwldzepxrbgtcjtlmpfj.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt3bGR6ZXB4cmJndGNqdGxtcGZqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNjI2OTgsImV4cCI6MjA5NTgzODY5OH0.VjhWLkg9Ex-eO2B9aFKEcsgT9FuDyMuXeRwHHlTx7_o";
const client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let currentSection='photos';

function safe(v){return String(v??'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showToast(msg){
const t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(()=>t.classList.remove('show'),2500);
}

function setActiveNav(section){
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
document.getElementById('nav-'+section).classList.add('active');
}

async function loadSection(type){
currentSection=type;
setActiveNav(type);
const el=document.getElementById('content');
el.style.opacity='0';
setTimeout(()=>{el.style.transition='opacity 0.4s';el.style.opacity='1';},50);

if(type==='photos'){
const res=await client.storage.from('pictures').list('',{limit:100,sortBy:{column:'created_at',order:'desc'}});
const files=(res.data||[]).filter(f=>f.name!=='.emptyFolderPlaceholder');
el.innerHTML=`
<div class="form-card">
<h3>add a photo ✦</h3>
<div class="drop-zone" id="dropZone">
<p>drop a photo here or tap to choose</p>
<input type="file" id="photoFile" accept="image/*" style="display:none">
</div>
<input type="text" id="photoCaption" placeholder="write a caption...">
<button class="btn" onclick="uploadPhoto()">paste it in ♡</button>
</div>
<div class="photo-grid">
${files.map(x=>`
<div class="polaroid">
<img src="${SUPABASE_URL}/storage/v1/object/public/pictures/${encodeURIComponent(x.name)}" alt="memory" loading="lazy">
<div class="caption">${safe(x.name.replace(/^\d+-/,'').replace(/\.[^.]+$/,''))}</div>
</div>
`).join('')}
</div>`;
initDropZone();
}

if(type==='poems'){
const res=await client.from('poems').select('*').order('created_at',{ascending:false});
el.innerHTML=`
<div class="form-card">
<h3>write a poem ✦</h3>
<input type="text" id="poemTitle" placeholder="give it a title...">
<textarea id="poemContent" rows="8" placeholder="pour your heart out here..."></textarea>
<button class="btn" onclick="savePoem()">save this poem ♡</button>
</div>
${(res.data||[]).map(p=>`
<div class="poem-page">
<h3>${safe(p.title)}</h3>
<div class="poem-text">${safe(p.content)}</div>
<div class="poem-date">${p.created_at?new Date(p.created_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):''}</div>
</div>
`).join('')}`;
}

if(type==='songs'){
const res=await client.from('songs').select('*').order('created_at',{ascending:false});
el.innerHTML=`
<div class="form-card">
<h3>add a song ✦</h3>
<input type="text" id="songTitle" placeholder="song title...">
<input type="text" id="songArtist" placeholder="artist...">
<input type="text" id="songUrl" placeholder="link (spotify, youtube, etc)...">
<button class="btn" onclick="saveSong()">add to mixtape ♡</button>
</div>
<div class="song-grid">
${(res.data||[]).map(s=>`
<div class="cassette">
<h3>${safe(s.title)}</h3>
<div class="artist">${safe(s.artist)}</div>
${s.url?`<a href="${safe(s.url)}" target="_blank" rel="noopener">▶ listen</a>`:''}
</div>
`).join('')}
</div>`;
}

if(type==='timeline'){
const res=await client.from('timeline').select('*').order('event_date',{ascending:false});
el.innerHTML=`
<div class="form-card">
<h3>add a memory ✦</h3>
<input type="text" id="timelineTitle" placeholder="what happened?">
<textarea id="timelineDesc" rows="4" placeholder="tell the story..."></textarea>
<input type="date" id="timelineDate">
<button class="btn" onclick="saveTimeline()">save this memory ♡</button>
</div>
<div class="timeline-container">
${(res.data||[]).map(t=>`
<div class="timeline-item">
<div class="date">${t.event_date||''}</div>
<h3>${safe(t.title)}</h3>
<p>${safe(t.description)}</p>
</div>
`).join('')}
</div>`;
}
}

function initDropZone(){
const zone=document.getElementById('dropZone');
const input=document.getElementById('photoFile');
if(!zone||!input)return;

zone.addEventListener('click',()=>input.click());
zone.addEventListener('dragover',(e)=>{e.preventDefault();zone.classList.add('dragover');});
zone.addEventListener('dragleave',()=>zone.classList.remove('dragover'));
zone.addEventListener('drop',(e)=>{
e.preventDefault();
zone.classList.remove('dragover');
if(e.dataTransfer.files.length){
input.files=e.dataTransfer.files;
zone.querySelector('p').textContent='photo ready: '+e.dataTransfer.files[0].name;
}
});
input.addEventListener('change',()=>{
if(input.files.length){
zone.querySelector('p').textContent='photo ready: '+input.files[0].name;
}
});
}

async function uploadPhoto(){
const input=document.getElementById('photoFile');
const caption=document.getElementById('photoCaption');
if(!input||!input.files[0]){showToast('pick a photo first!');return;}
const file=input.files[0];
const name=Date.now()+'-'+(caption.value||file.name).replace(/[^a-zA-Z0-9.-]/g,'_')+'.'+file.name.split('.').pop();
const{error}=await client.storage.from('pictures').upload(name,file);
if(error){showToast('oops: '+error.message);return;}
showToast('photo saved ♡');
loadSection('photos');
}

async function savePoem(){
const title=document.getElementById('poemTitle').value.trim();
const content=document.getElementById('poemContent').value.trim();
if(!title||!content){showToast('write something first!');return;}
const{error}=await client.from('poems').insert({title,content});
if(error){showToast('oops: '+error.message);return;}
showToast('poem saved ♡');
loadSection('poems');
}

async function saveSong(){
const title=document.getElementById('songTitle').value.trim();
const artist=document.getElementById('songArtist').value.trim();
const url=document.getElementById('songUrl').value.trim();
if(!title){showToast('add a song title!');return;}
const{error}=await client.from('songs').insert({title,artist,url});
if(error){showToast('oops: '+error.message);return;}
showToast('song added ♡');
loadSection('songs');
}

async function saveTimeline(){
const title=document.getElementById('timelineTitle').value.trim();
const description=document.getElementById('timelineDesc').value.trim();
const event_date=document.getElementById('timelineDate').value;
if(!title){showToast('name this memory!');return;}
const{error}=await client.from('timeline').insert({title,description,event_date:event_date||null});
if(error){showToast('oops: '+error.message);return;}
showToast('memory saved ♡');
loadSection('timeline');
}
</script>
